{% extends "base.html" %}

{% block title %}設定完了 - {{ config.main_title }}{% endblock %}

{% block content %}
<div align="center">
    <br><br><br>
    <table class="style-cls-208" border="1" cellspacing="0" cellpadding="15" bgcolor="#030315" bordercolor="{{ config.color_dark }}">
        <tr bgcolor="#0a0a25">
            <td class="style-cls-18" align="center">
                <span class="font-size-4 color-ffaa55"><b>🔑 変更用単語の設定完了</b></span>
            </td>
        </tr>
        <tr>
            <td class="style-cls-206" align="center">
                <p class="style-cls-37">
                    パスワード変更用単語の登録が完了しました。
                </p>
                <br>
                <div class="style-cls-209">
                    {{ word }}
                </div>
                <br>
                <p class="style-cls-210">
                    ⚠️ この単語はパスワードを変更・再設定する際に必ず必要となります。<br>
                    絶対に忘れないようにメモ等に控えておいてください。
                </p>
            </td>
        </tr>
    </table>
    <br><br>
    
    <!-- 戻るボタン -->
    <form class="style-cls-39" action="{{ config.passchange_script }}" method="POST">
        <input type="hidden" name="s" value="{{ csrf_token }}">
        <input type="hidden" name="id" value="{{ user_id }}">
        <input type="submit" class="btn" value="パスワード変更所に戻る">
    </form>
    
    <form class="style-cls-40" action="{{ config.main_script }}" method="POST">
        <input type="hidden" name="s" value="{{ csrf_token }}">
        <input type="hidden" name="id" value="{{ user_id }}">
        <input type="submit" class="btn" value="街に戻る">
    </form>
    <br><br><br>
</div>
{% endblock %}
