{% extends "base.html" %}

{% block title %}作戦変更完了 - {{ config.main_title }}{% endblock %}

{% block head %}

{% endblock %}

{% block content %}
<div class="container">
    <div class="success-msg">⚔️ 作戦（戦術）を「{{ selected_tac_name }}」に変更しましたクポ！</div>
    
    <div class="btn-container">
        <form action="login.py?mode=tac_change" method="post">
        <input type="hidden" name="s" value="{{ csrf_token }}">
            <input type="hidden" name="id" value="{{ chara.id }}">
            <input type="hidden" name="mydata" value="{{ chara_log }}">
            <input type="submit" class="btn-link" value="⚔️ 作戦会議室に戻る">
        </form>
        <!-- 移行のため、直接の ffadventure.py から login.py?mode=main へ修正 -->
        <form action="login.py?mode=main" method="post">
        <input type="hidden" name="s" value="{{ csrf_token }}">
            <input type="hidden" name="id" value="{{ chara.id }}">
            <input type="hidden" name="mydata" value="{{ chara_log }}">
            <input type="submit" class="btn-link" value="🏡 メイン画面へ">
        </form>
    </div>
</div>
{% endblock %}
