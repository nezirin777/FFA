{% extends "base.html" %}

{% block title %}待機時間 - {{ config.main_title }}{% endblock %}

{% block head %}
<script type="text/javascript">
    var timer = {{ vtime }};
    function count_down() {
        if (timer > 0) {
            timer--;
            document.getElementById("clock").value = timer;
            setTimeout("count_down()", 1000);
        } else {
            document.getElementById("submit-btn").disabled = false;
            document.getElementById("submit-btn").value = "再挑戦する！";
        }
    }
    window.onload = count_down;
</script>

{% endblock %}

{% block content %}
<div class="error-container">
    <h1 class="style-cls-130">戦闘待機時間</h1>
    
    <div class="style-cls-131">
        前回の戦闘からまだ十分な時間が経過していません。<br>
        ボスの警戒が解けるまで待つ必要があります。
    </div>

    <div class="clock-display">
        残り待機時間: <input type="text" id="clock" class="clock-input" value="{{ vtime }}" readonly> 秒
    </div>

    <!-- 再挑戦フォーム -->
    <form action="legend.py" method="POST">
        <input type="hidden" name="mode" value="boss">
        <input type="hidden" name="id" value="{{ chara.id }}">
        <input type="hidden" name="boss_file" value="{{ boss_file }}">
        <input type="submit" id="submit-btn" class="btn" value="待機中..." disabled>
    </form>

    <a href="ffadventure.py?id={{ chara.id }}" class="btn style-cls-14">街に戻る</a>
</div>
{% endblock %}
