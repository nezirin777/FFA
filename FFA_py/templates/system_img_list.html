{% extends "base.html" %}

{% block title %}キャラクター画像一覧 - {{ config.main_title }}{% endblock %}

{% block head %}

{% endblock %}

{% block content %}
<div class="container">
    <div class="header-title">利用可能なキャラクター画像一覧</div>
    
    <div class="style-cls-297">
        プロフィール変更時、使いたい画像の「番号」をフォームに入力するクポ。
    </div>

    <!-- 画像グリッド -->
    <div class="img-grid">
        {% for img in chara_img %}
        <div class="img-card">
            <img src="{{ config.img_path }}/{{ img }}" class="img-element"><br>
            <span class="img-num">No.{{ loop.index0 }}</span>
        </div>
        {% endfor %}
    </div>

    <div class="btn-container">
        <a href="javascript:window.close();" class="btn-close">❌ このウィンドウを閉じる</a>
    </div>
</div>
{% endblock %}
