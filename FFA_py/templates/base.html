<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Script-Type" content="text/javascript">
    <meta http-equiv="Content-Style-Type" content="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ config.main_title }}{% endblock %}</title>
    
    <!-- 既存のCSSとJavaScriptの読み込み -->
    <link rel="stylesheet" href="html/cgi.css" type="text/css">
    <link rel="stylesheet" href="html/game.css" type="text/css">
    <script src="html/const.js" type="text/javascript"></script>
    
    <style type="text/css">
        :root {
            --bgcolor: {{ config.bg_color }};
            --text-color: {{ config.text_color }};
            --link-color: {{ config.link_color }};
            --vlink-color: {{ config.vlink_color }};
            --alink-color: {{ config.alink_color }};
            
            --yellow: {{ config.color_yellow }};
            --red: {{ config.color_red }};
            --blue: {{ config.color_blue }};
            --green: {{ config.color_green }};
            --white: {{ config.color_white }};
            --dark: {{ config.color_dark }};
        }
        
        body {
            font-family: "{{ config.font_name }}", sans-serif;
            font-size: {{ config.body_size }};
            color: var(--text-color);
            background-color: var(--bgcolor);
            background-image: {% block background_image %}{% if config.bg_gif %}url({{ config.bg_gif }}){% else %}none{% endif %}{% endblock %};
            background-attachment: fixed;
            margin: 20px;
        }
        a { color: var(--link-color); }
        a:visited { color: var(--vlink-color); }
        a:active { color: var(--alink-color); }
        
        /* 共通テキストカラー定義 */
        .red { font-family: "{{ config.font_name }}"; color: var(--red); }
        .yellow { font-family: "{{ config.font_name }}"; color: var(--yellow); }
        .blue { font-family: "{{ config.font_name }}"; color: var(--blue); }
        .green { font-family: "{{ config.font_name }}"; color: var(--green); }
        .white { font-family: "{{ config.font_name }}"; color: var(--white); }
        .dark { font-family: "{{ config.font_name }}"; color: var(--dark); }
        .small { font-size: 100%; font-family: "{{ config.font_name }}"; color: var(--red); }


    </style>
    {% block head %}{% endblock %}
</head>
<body>

    <!-- 音楽再生 (MIDI設定) -->
    {% if config.midi_set and midi %}
    <embed src="{{ midi }}" type="audio/midi" height="2" autostart="true" repeat="true" save="false" volume="100" width="2">
    {% endif %}

    <!-- メインコンテンツ -->
    <div id="main-content">
        {% block content %}{% endblock %}
    </div>

    <!-- 共通フッター -->
    {% block footer %}
    <hr size="1" color="{{ config.color_dark }}">
    <div align="center">
        <a href="{{ config.others_script }}">【{{ config.main_title }} TOP】</a>
    </div>
    <hr size="0" width="100%">
    <div align="right" style="color: {{ config.vlink_color }}">
        FFA改 Vips Ver 3.00 (Original ver2.00 edit by <a href="http://www.eriicu.com" target="_blank">いく</a>)<br>
        FFA Emilia Ver1.01 remodeled by Classic<br>
    </div>
    {% endblock %}

</body>
</html>
