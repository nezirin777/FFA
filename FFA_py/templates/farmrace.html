{% extends "base.html" %}

{% block content %}

<div class="race-container">
  <div class="race-title">
    チョコボ王者決定戦！
  </div>

  <!-- レーストラック -->
  <div class="race-track">
    <div class="goal-line"></div>
    
    <!-- あなたのチョコボ -->
    <div class="lane">
      <span class="lane-label">挑戦者</span>
      <span class="lane-name">{{ choco.name }}</span>
      <img src="{{ config.img_farm }}/{{ config.choco_images[choco.no] }}" class="choco-runner" id="runner-0">
    </div>

    <!-- 王者チョコボ -->
    <div class="lane">
      <span class="lane-label style-cls-111">王者</span>
      <span class="lane-name">{{ winner.name }}</span>
      <img src="{{ config.img_farm }}/{{ config.choco_images[winner.no] }}" class="choco-runner" id="runner-1">
    </div>
  </div>

  <!-- 実況ログ -->
  <div class="commentary-box" id="commentary">
    <div class="commentary-line style-cls-78">王者決定戦がスタートするクポ！</div>
  </div>

  <!-- 最終結果 -->
  <div class="result-box" id="result-box">
    <div class="result-summary" id="result-summary">レース終了</div>
    <div class="result-details">
      <div class="style-cls-27" id="result-comment"></div>
      
      <div class="style-cls-112">
        <h4 class="style-cls-90">レース報酬 ＆ 能力値変化</h4>
        <p id="result-agari"></p>
        {% if senzai %}
          <p class="style-cls-78">{{ senzai|safe }}</p>
        {% endif %}
        {% if genkai %}
          <p class="style-cls-91">{{ genkai|safe }}</p>
        {% endif %}
        {% if rousui %}
          <p class="style-cls-92">{{ rousui|safe }}</p>
        {% endif %}
      </div>
    </div>

    <!-- 戻るボタン -->
    <form action="{{ config.chocofarm_script }}" method="post">
        <input type="hidden" name="s" value="{{ csrf_token }}">
      <input type="hidden" name="id" value="{{ chara.id }}">
      <input type="hidden" name="mydata" value="{{ chara_log }}">
      <input type="submit" class="btn-farm" value="牧場に戻る">
    </form>
  </div>
</div>

<script>
  const turns = {{ turns_json|safe }};
  const totalDistance = 2400;
  
  const track = document.querySelector('.race-track');
  const trackWidth = track.clientWidth;
  const startOffset = 50; 
  const goalOffset = 180; 
  const runWidth = trackWidth - startOffset - goalOffset - 44; 

  let currentStep = 0;
  const stepInterval = 400; 

  function playNextStep() {
    if (currentStep >= turns.length) {
      document.getElementById("result-box").style.display = "block";
      document.getElementById("result-comment").innerHTML = `{{ comment|safe }}`;
      document.getElementById("result-agari").innerHTML = `{{ agari|safe }}`;
      if ({{ win_js }}) {
        document.getElementById("result-summary").innerText = "🏆 新王者の誕生クポ！";
        document.getElementById("result-summary").style.color = "#ffcc00";
      } else {
        document.getElementById("result-summary").innerText = "👑 王者防衛クポ...";
        document.getElementById("result-summary").style.color = "#ff5555";
      }
      return;
    }

    const stepData = turns[currentStep];

    // あなたのチョコボの位置
    const ratio0 = (totalDistance - stepData.pos0) / totalDistance;
    const rightPx0 = startOffset + (ratio0 * runWidth);
    const runner0 = document.getElementById("runner-0");
    runner0.style.right = rightPx0 + "px";
    
    // 王者チョコボの位置
    const ratio1 = (totalDistance - stepData.pos1) / totalDistance;
    const rightPx1 = startOffset + (ratio1 * runWidth);
    const runner1 = document.getElementById("runner-1");
    runner1.style.right = rightPx1 + "px";
    
    // 揺らすアニメーション
    const bounce = (currentStep % 2 === 0) ? -3 : 0;
    runner0.style.transform = `translateY(${bounce}px)`;
    runner1.style.transform = `translateY(${-bounce}px)`;

    // 実況メッセージの追加
    if (stepData.comment) {
      const commBox = document.getElementById("commentary");
      const newLine = document.createElement("div");
      newLine.className = "commentary-line";
      newLine.innerHTML = stepData.comment;
      commBox.appendChild(newLine);
      commBox.scrollTop = commBox.scrollHeight;
    }

    currentStep++;
    setTimeout(playNextStep, stepInterval);
  }

  window.onload = function() {
    setTimeout(playNextStep, 1000);
  };
</script>
{% endblock %}
