{% extends "base.html" %}

{% block title %}取引結果 - {{ config.main_title }}{% endblock %}

{% block content %}
<div align="center">
    <br><br><br>
    <table class="style-cls-35" border="1" cellspacing="0" cellpadding="12" bgcolor="#03031a" bordercolor="{{ config.color_dark }}">
        <tr bgcolor="#0a0a25">
            <td class="style-cls-18" align="center">
                <span class="font-size-4 color-configyellow"><b>🏦 取引完了のお知らせ</b></span>
            </td>
        </tr>
        <tr>
            <td class="style-cls-36" align="center">
                <p class="style-cls-37">
                    {{ msg }}
                </p>
                <br>
                <hr size="1" color="{{ config.color_dark }}">
                <br>
                <table class="style-cls-38" border="0" cellpadding="5" cellspacing="0">
                    <tr>
                        <td class="style-cls-16">現在の手持ち資金:</td>
                        <td><b class="style-cls-19">{{ chara.gold }}</b> G</td>
                    </tr>
                    <tr>
                        <td class="style-cls-16">現在の銀行預金残高:</td>
                        <td><b class="style-cls-20">{{ chara.bank }}</b> G</td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
    <br><br>
    
    <!-- 銀行のトップに戻る -->
    <form class="style-cls-39" action="{{ config.bank_script }}" method="POST">
        <input type="hidden" name="s" value="{{ csrf_token }}">
        <input type="hidden" name="id" value="{{ user_id }}">
        <input type="submit" class="btn" value="銀行に戻る">
    </form>
    
    <!-- 街に戻る -->
    <form class="style-cls-40" action="{{ config.main_script }}" method="POST">
        <input type="hidden" name="s" value="{{ csrf_token }}">
        <input type="hidden" name="id" value="{{ user_id }}">
        <input type="submit" class="btn" value="街に戻る">
    </form>
    <br><br><br>
</div>
{% endblock %}
