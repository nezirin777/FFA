{% extends "base.html" %}

{% block title %}返信作成 - {{ config.main_title }}{% endblock %}

{% block content %}
<div class="post-detail-container">
    <div class="post-header">
        <h1>✉️ メッセージを返信する</h1>
        <p class="post-subtitle"><b>{{ res_name }}</b> さんへの返信を作成します。</p>
        <hr>
    </div>

    <div class="card post-detail-card">
        <div class="card__body">
            <form action="{{ config.script_post }}" method="POST" class="layout-stack">
                <input type="hidden" name="s" value="{{ csrf_token }}">
                <input type="hidden" name="id" value="{{ chara.id }}">
                <input type="hidden" name="mode" value="message">
                <input type="hidden" name="mesid" value="{{ res_id }}">
                <input type="hidden" name="mesname" value="{{ res_name }}">
                
                <table class="post-form-table">
                    <tr>
                        <th>宛先:</th>
                        <td><b>{{ res_name }} さん (ID: {{ res_id }})</b></td>
                    </tr>
                    <tr>
                        <th>引用/前文:</th>
                        <td>
                            <div class="post-quote">
                                {{ res_content }}
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <th>返信本文:</th>
                        <td>
                            <textarea name="mes" cols="40" rows="5" class="form-control"></textarea>
                            <div class="post-form-note">※最大1000文字 / 暴言等は自動的にエラーになります。</div>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <input type="submit" class="btn btn--block" value="返信を送信する">
                        </td>
                    </tr>
                </table>
            </form>
        </div>
    </div>
    
    <!-- 戻るボタン -->
    <div class="post-nav-actions">
        <a href="login.py?mode=post_message&id={{ chara.id }}" class="btn">郵便局に戻る</a>
        <a href="login.py?mode=main&id={{ chara.id }}" class="btn">街に戻る</a>
    </div>
</div>
{% endblock %}
