{% extends "base.html" %}

{% block content %}
<div class="farm-container farm-container--md">
    <div class="farm-header">
        <h1>💪 チョコボトレーニング</h1>
        <hr>
    </div>

    <!-- 指導モーグリ -->
    <div class="farm-msg-box">
        <div class="farm-msg-content">
            「クポッ！トレーニング指導員のモーグリクポ！<br>
            愛チョコボの長所を伸ばしたり、弱点を補うメニューを選択するクポ！」
        </div>
    </div>

    <div class="farm-card">
        <div class="farm-card__title">🏋️ 訓練メニュー (費用: 50G)</div>
        <div class="card__body">
            <form action="{{ config.crace_script }}" method="POST" class="layout-stack">
                <input type="hidden" name="id" value="{{ chara.id }}">
                <input type="hidden" name="mode" value="train_start">
                
                <div class="farm-action-row">
                    <span class="farm-action-label">トレーニングメニュー:</span>
                    <div class="farm-action-form">
                        <select name="train_menu" class="farm-select">
                            <option value="speed">スピード特訓 (速度増加)</option>
                            <option value="stamina">耐久ランニング (スタミナ増加)</option>
                            <option value="balance">並走訓練 (親愛度・バランス向上)</option>
                        </select>
                    </div>
                </div>

                <input type="submit" class="farm-btn btn--block u-mt-m" value="トレーニングを開始する">
            </form>
        </div>
    </div>

    <!-- 戻るボタン -->
    <div class="farm-back-actions">
        <form action="{{ config.chocofarm_script }}" method="POST">
            <input type="hidden" name="id" value="{{ chara.id }}">
            <input type="submit" class="btn" value="チョコボ牧場に戻る">
        </form>
    </div>
</div>
{% endblock %}
