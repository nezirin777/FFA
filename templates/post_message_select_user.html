{% extends "base.html" %}

{% block title %}宛先選択 - {{ config.main_title }}{% endblock %}

{% block content %}
<div class="post-detail-container">
    <div class="post-header">
        <h1>✉️ 送信先キャラクター選択</h1>
        <p class="post-subtitle">メッセージを送る相手を登録者一覧から選択します。</p>
        <hr>
    </div>

    <div class="card post-detail-card">
        <div class="card__body">
            <form action="{{ config.script_post }}" method="POST" class="layout-stack">
                <input type="hidden" name="id" value="{{ chara.id }}">
                <input type="hidden" name="mode" value="message">
                
                <table class="post-form-table">
                    <tr>
                        <th>メッセージ本文:</th>
                        <td>
                            <textarea name="mes" cols="40" rows="3" class="form-control"></textarea>
                        </td>
                    </tr>
                    <tr>
                        <th>送信相手の選択:</th>
                        <td>
                            <select name="mesid" size="15" class="form-control">
                                {% for player in players %}
                                <option value="{{ player.id }}">{{ player.name }} さん (Lv.{{ player.level }} / {{ config.chara_syoku[player.job] }})</option>
                                {% else %}
                                <option value="">現在登録されている冒険者は他にいません</option>
                                {% endfor %}
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <input type="submit" class="btn btn--block" value="選択した相手にメッセージを送信">
                        </td>
                    </tr>
                </table>
            </form>
        </div>
    </div>
    
    <!-- 戻るボタン -->
    <div class="post-nav-actions">
        <a href="login.py?mode=post_message&id={{ chara.id }}" class="btn">郵便局に戻る</a>
        <a href="login.py?mode=main&id={{ chara.id }}" class="btn">街に戻る</a>
    </div>
</div>
{% endblock %}
