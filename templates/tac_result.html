{% extends "base.html" %}

{% block title %}作戦変更完了 - {{ config.main_title }}{% endblock %}

{% block content %}
<div class="tac-result-container">
    <div class="card tac-result-card">
        <div class="card__header">⚔️ 作戦変更完了</div>
        <div class="card__body">
            作戦（戦術）を「{{ selected_tac_name }}」に変更しましたクポ！
        </div>
    </div>
    
    <div class="tac-result-actions">
        <form action="login.py?mode=tac_change" method="post">
            <input type="hidden" name="s" value="{{ csrf_token }}">
            <input type="hidden" name="id" value="{{ chara.id }}">
            <input type="hidden" name="mydata" value="{{ chara_log }}">
            <input type="submit" class="btn tac-result-btn" value="⚔️ 作戦会議室に戻る">
        </form>
        <form action="login.py?mode=main" method="post">
            <input type="hidden" name="s" value="{{ csrf_token }}">
            <input type="hidden" name="id" value="{{ chara.id }}">
            <input type="hidden" name="mydata" value="{{ chara_log }}">
            <input type="submit" class="btn tac-result-btn" value="🏡 街に戻る">
        </form>
    </div>
</div>
{% endblock %}
