{% extends "base.html" %}

{% block content %}
<div class="farm-container farm-container--md">
    <div class="farm-header">
        <h1>🏛️ チョコボの殿堂</h1>
        <hr>
    </div>

    <div class="farm-card">
        <div class="farm-card__title">👑 伝説の駿馬リスト</div>
        <div class="table-wrapper">
            <table class="shop-table">
                <thead>
                    <tr>
                        <th>殿堂No</th>
                        <th>チョコボ名</th>
                        <th>所有者</th>
                        <th>スピード</th>
                        <th>スタミナ</th>
                        <th>最終クラス</th>
                        <th>引退年齢</th>
                    </tr>
                </thead>
                <tbody>
                    {% for c in legends %}
                    <tr>
                        <td><b>{{ loop.index }}</b></td>
                        <td class="yellow"><b>{{ c.name }}</b></td>
                        <td>{{ c.owner }}</td>
                        <td>{{ c.speed }}</td>
                        <td>{{ c.stamina }}</td>
                        <td>{{ c.class_name }}</td>
                        <td>{{ c.age }} 歳</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="7" class="msg-empty">殿堂入りしたチョコボはいません。</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <!-- 戻るボタン -->
    <div class="farm-back-actions">
        <form action="{{ config.chocofarm_script }}" method="POST">
            <input type="hidden" name="id" value="{{ chara.id }}">
            <input type="submit" class="btn" value="チョコボ牧場に戻る">
        </form>
    </div>
</div>
{% endblock %}
