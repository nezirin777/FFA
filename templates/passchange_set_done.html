{% extends "base.html" %}

{% block title %}設定完了 - {{ config.main_title }}{% endblock %}

{% block content %}
<div class="u-text-center">
    <br><br><br>
    <div class="card card--orange content-sm">
        <div class="card__header">🔑 変更用単語の設定完了</div>
        <div class="card__body">
            <p class="u-text-center passchange-set-msg">
                パスワード変更用単語の登録が完了しました。
            </p>
            
            <div class="passchange-word-box">
                {{ word }}
            </div>
            
            <p class="u-text-center note-text note-text--danger">
                <strong>⚠️ この単語はパスワードを変更・再設定する際に必ず必要となります。<br>
                絶対に忘れないようにメモ等に控えておいてください。</strong>
            </p>
        </div>
    </div>
    <br><br>
    
    <!-- 戻るボタン -->
    <div class="passchange-actions">
        <form action="{{ config.script_pass }}" method="POST">
            <input type="hidden" name="s" value="{{ csrf_token }}">
            <input type="hidden" name="id" value="{{ user_id }}">
            <input type="submit" class="btn" value="パスワード変更所に戻る">
        </form>
        
        <form action="{{ config.script }}" method="POST">
            <input type="hidden" name="s" value="{{ csrf_token }}">
            <input type="hidden" name="id" value="{{ user_id }}">
            <input type="submit" class="btn" value="街に戻る">
        </form>
    </div>
    <br><br><br>
</div>
{% endblock %}
