{% extends "base.html" %}

{% block content %}
<div class="farm-container farm-container--md">
    <div class="farm-header">
        <h1>🏁 チョコボレース出走</h1>
        <hr>
    </div>

    <div class="farm-card">
        <div class="farm-card__title">🏆 出走クラスとコース選択</div>
        <div class="card__body">
            <form action="{{ config.crace_script }}" method="POST" class="layout-stack">
                <input type="hidden" name="id" value="{{ chara.id }}">
                <input type="hidden" name="mode" value="start">
                
                <div class="farm-action-row">
                    <span class="farm-action-label">出走クラス:</span>
                    <div class="farm-action-form">
                        <select name="race_class" class="farm-select">
                            <option value="D">クラス D (初心者)</option>
                            {% if max_class in ['C', 'B', 'A', 'S'] %}
                            <option value="C">クラス C</option>
                            {% endif %}
                            {% if max_class in ['B', 'A', 'S'] %}
                            <option value="B">クラス B</option>
                            {% endif %}
                            {% if max_class in ['A', 'S'] %}
                            <option value="A">クラス A</option>
                            {% endif %}
                            {% if max_class == 'S' %}
                            <option value="S">クラス S (王者)</option>
                            {% endif %}
                        </select>
                    </div>
                </div>

                <div class="farm-action-row">
                    <span class="farm-action-label">コース距離:</span>
                    <div class="farm-action-form">
                        <select name="race_kyori" class="farm-select">
                            <option value="1000">1000m (短距離・スピード重視)</option>
                            <option value="2000">2000m (中距離・バランス重視)</option>
                            <option value="3000">3000m (長距離・スタミナ重視)</option>
                        </select>
                    </div>
                </div>

                <input type="submit" class="farm-btn btn--block u-mt-m" value="レース出走 (エントリー代: 100G)">
            </form>
        </div>
    </div>

    <!-- 戻るボタン -->
    <div class="farm-back-actions">
        <form action="{{ config.chocofarm_script }}" method="POST">
            <input type="hidden" name="id" value="{{ chara.id }}">
            <input type="submit" class="btn" value="チョコボ牧場に戻る">
        </form>
    </div>
</div>
{% endblock %}
