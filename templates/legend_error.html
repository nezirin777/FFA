{% extends "base.html" %}

{% block title %}待機時間 - {{ config.main_title }}{% endblock %}

{% block head %}
<script type="text/javascript">
    var timer = {{ vtime }};
    function count_down() {
        if (timer > 0) {
            timer--;
            document.getElementById("clock").value = timer;
            setTimeout("count_down()", 1000);
        } else {
            document.getElementById("submit-btn").disabled = false;
            document.getElementById("submit-btn").value = "再挑戦する！";
        }
    }
    window.onload = count_down;
</script>
{% endblock %}

{% block content %}
<div class="err-container">
    <div class="card err-card">
        <div class="card__header err-card__header">⏳ 戦闘待機時間</div>
        <div class="card__body err-card__body">
            <p>
                前回の戦闘からまだ十分な時間が経過していません。<br>
                ボスの警戒が解けるまで待つ必要があります。
            </p>

            <div class="err-clock-display">
                残り待機時間: <input type="text" id="clock" class="err-clock-input" value="{{ vtime }}" readonly> 秒
            </div>

            <!-- 再挑戦フォーム -->
            <form action="login.py?mode=legend" method="POST" class="layout-stack">
                <input type="hidden" name="s" value="{{ csrf_token }}">
                <input type="hidden" name="mode" value="boss">
                <input type="hidden" name="id" value="{{ chara.id }}">
                <input type="hidden" name="boss_file" value="{{ boss_file }}">
                <input type="submit" id="submit-btn" class="btn err-btn-action" value="待機中..." disabled>
            </form>

            <br>
            <a href="login.py?mode=main&id={{ chara.id }}" class="btn btn-secondary">街に戻る</a>
        </div>
    </div>
</div>
{% endblock %}
