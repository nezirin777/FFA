{% extends "base.html" %}

{% block title %}ステータス変更完了 - {{ config.main_title }}{% endblock %}

{% block head %}

{% endblock %}

{% block content %}
<div class="sts-result-container">
    <div class="sts-result-success-msg">🎉 {{ chara.name }} さんのプロフィール設定を更新しましたクポ！</div>
    
    <div class="sts-result-btn-container">
        <form action="login.py?mode=sts" method="post">
            <input type="hidden" name="s" value="{{ csrf_token }}">
            <input type="hidden" name="id" value="{{ chara.id }}">
            <input type="hidden" name="mydata" value="{{ chara_log }}">
            <input type="submit" class="sts-result-btn-link" value="⚙️ ステータス設定画面へ">
        </form>
        <form action="login.py?mode=main" method="post">
            <input type="hidden" name="s" value="{{ csrf_token }}">
            <input type="hidden" name="id" value="{{ chara.id }}">
            <input type="hidden" name="mydata" value="{{ chara_log }}">
            <input type="submit" class="sts-result-btn-link" value="🏡 街に戻る">
        </form>
    </div>
</div>
{% endblock %}
